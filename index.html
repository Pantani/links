<style>
  :root {
    --bg: #0a0a0b;
    --bg-elevated: #101012;
    --bg-elevated-hover: #131316;
    --fg: #e8e8ea;
    --fg-muted: #8a8a92;
    --fg-dim: #5a5a62;
    --border: #1f1f23;
    --border-strong: #2a2a30;
    --accent: #7cf29c;
    --accent-dim: rgba(124, 242, 156, 0.14);
    --focus: #7cf29c;
    --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--mono);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    position: relative;
    overflow-x: hidden;

    background-image:
      radial-gradient(circle at 1px 1px, rgba(232, 232, 234, 0.045) 1px, transparent 0);
    background-size: 24px 24px;
    background-position: 0 0;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse at 50% 0%, transparent 0%, var(--bg) 70%),
      radial-gradient(ellipse at 50% 100%, transparent 0%, var(--bg) 80%);
    z-index: 0;
  }

  main {
    position: relative;
    z-index: 1;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 64px 20px 32px;
  }

  .container {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 40px;
  }

  .profile {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 20px;
  }

  .monogram {
    width: 64px;
    height: 64px;
    border: 1px solid var(--border-strong);
    border-radius: 12px;
    display: grid;
    place-items: center;
    font-family: var(--mono);
    font-weight: 600;
    font-size: 28px;
    color: var(--fg);
    background:
      linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0)) ,
      var(--bg-elevated);
    letter-spacing: -0.02em;
    user-select: none;
  }

  .identity {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .name-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  h1.name {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 28px;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin: 0;
    color: var(--fg);
  }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    padding: 3px 8px;
    border: 1px solid var(--border-strong);
    border-radius: 999px;
    background: var(--bg-elevated);
    white-space: nowrap;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 var(--accent);
    animation: pulse 2.4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(124, 242, 156, 0.55); }
    50%      { box-shadow: 0 0 0 6px rgba(124, 242, 156, 0); }
  }

  .tagline {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--fg-muted);
    margin: 0;
    max-width: 38ch;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .link {
    --link-bg: var(--bg-elevated);
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    background: var(--link-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--fg);
    text-decoration: none;
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.005em;
    min-height: 60px;
    transition:
      background-color 180ms ease,
      border-color 180ms ease,
      transform 180ms ease;
    position: relative;
  }

  .link:hover,
  .link:focus-visible {
    background: var(--bg-elevated-hover);
    border-color: var(--accent);
  }

  .link:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
  }

  .link:active { transform: translateY(1px); }

  .link-icon {
    width: 22px;
    height: 22px;
    display: grid;
    place-items: center;
    color: var(--fg);
    flex-shrink: 0;
  }

  .link-icon svg { width: 100%; height: 100%; display: block; }

  .link-body {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-width: 0;
  }

  .link-label {
    font-size: 15px;
    color: var(--fg);
    line-height: 1.2;
  }

  .link-sub {
    font-size: 12px;
    color: var(--fg-muted);
    line-height: 1.3;
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .link-arrow {
    width: 18px;
    height: 18px;
    color: var(--fg-dim);
    flex-shrink: 0;
    transition: transform 180ms ease, color 180ms ease;
  }

  .link:hover .link-arrow,
  .link:focus-visible .link-arrow {
    transform: translateX(4px);
    color: var(--accent);
  }

  footer {
    position: relative;
    z-index: 1;
    padding: 24px 20px 32px;
    text-align: center;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--fg-dim);
    letter-spacing: 0.01em;
  }

  footer .dot {
    display: inline-block;
    margin: 0 8px;
    opacity: 0.6;
  }

  @media (max-width: 420px) {
    main { padding: 40px 18px 24px; }
    .container { gap: 32px; }
    h1.name { font-size: 26px; }
    .link { padding: 15px 16px; min-height: 58px; }
  }

  @media (min-width: 1024px) {
    main { padding-top: 96px; }
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #fafafa;
      --bg-elevated: #ffffff;
      --bg-elevated-hover: #f2f2f3;
      --fg: #0a0a0b;
      --fg-muted: #5a5a62;
      --fg-dim: #9a9aa2;
      --border: #e6e6e8;
      --border-strong: #d8d8dc;
      --accent: #14a05a;
      --accent-dim: rgba(20, 160, 90, 0.12);
      --focus: #14a05a;
    }
    body {
      background-image: radial-gradient(circle at 1px 1px, rgba(10, 10, 11, 0.06) 1px, transparent 0);
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(20, 160, 90, 0.45); }
      50%      { box-shadow: 0 0 0 6px rgba(20, 160, 90, 0); }
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .status-dot { animation: none; }
    .link, .link-arrow { transition: none; }
  }

  ::selection {
    background: var(--accent-dim);
    color: var(--fg);
  }
</style>
</head>
<body>

        <div class="identity">

        </div>

      <nav class="links" aria-label="Links principais">

          </span>
          <span class="link-body">

          </span>
          <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

      </nav>
    </div>
  </main>

  <footer>
    <span>2026</span>

    <span>Built by Pantani</span>
